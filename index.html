<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gurukul School - Welcome Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1930 0%, #1a3668 100%);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #ffffff;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 110px;
        }

        /* स्कूल लोगो */
        .school-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ffffff;
            padding: 4px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            object-fit: contain;
            margin-bottom: 15px;
        }

        .school-name {
            font-size: 22px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .school-location {
            font-size: 15px;
            color: #ffc107; 
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 3px;
        }

        /* बिल्डिंग फोटो */
        .building-box {
            width: 100%;
            height: 200px;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 3px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 30px;
            background: #111;
        }

        .building-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* बटन डिज़ाइन */
        .portal-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: transform 0.2s;
            box-sizing: border-box;
        }

        .portal-btn:active {
            transform: scale(0.97);
        }

        /* रिज़ल्ट बटन */
        .btn-result {
            background: linear-gradient(45deg, #d32f2f, #e53935);
            color: #ffffff;
            border: 1px solid #ff5252;
        }

        /* नया फीस पोर्टल बटन */
        .btn-fees {
            background: linear-gradient(45deg, #1e8449, #27ae60);
            color: #ffffff;
            border: 1px solid #2ecc71;
        }

        /* वेबसाइट बटन */
        .btn-website {
            background: #ffffff;
            color: #0a1930;
            border: 2px solid #ffffff;
        }
.social-title {
            font-size: 13px;
            font-weight: bold;
            color: #a0b2c6;
            margin-top: 15px;
            margin-bottom: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .social-icons-container {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 20px;
        }

        .icon-link {
            width: 45px;
            height: 45px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        
        .icon-link:active {
            transform: scale(0.9);
        }

        .icon-link svg {
            width: 24px;
            height: 24px;
        }

        @keyframes rainbowBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rainbow-strip-box {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 4px;
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #008000, #0000ff, #4b0082, #ff0000);
            background-size: 400% 400%;
            animation: rainbowBorder 3s linear infinite;
            box-sizing: border-box;
            z-index: 999;
        }

        .footer-content-strip {
            background: #0a1930; 
            color: #fff;
            padding: 12px 10px;
            text-align: center;
            border-radius: 4px;
        }

        .footer-row-1 {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            color: #ffc107; 
        }

        .footer-row-2 {
            font-size: 13px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 1px;
        }
    </style>
</head>
